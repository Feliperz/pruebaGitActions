name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code #toma los archivos del repositorio
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Git Semantic Version
      id: version
      uses: PaulHatch/semantic-version@v4.0.3
      with:
        major_pattern: "major:"
        minor_pattern: "feat:"
        patch_pattern: "fix:"
        format: "${major}.${minor}.${patch}-prerelease${increment}"
      
    - name: Docker login
      env:
        DOCKER_USER: ${{ secrets.DOCKER_USER }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }} 
         
      run: |
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
        echo "nueva version: $NEW_VERSION"
        
    - name: Build Docker Image
      env:
        NEW_VERSION: ${{ steps.version.outputs.version }}
      run: |
        docker build -t felipercz/docker-graph:$NEW_VERSION .
        docker build -t felipercz/docker-graph:latest . 
        
    - name: Push Docker Image
      env:
          NEW_VERSION: ${{ steps.version.outputs.version }}
      run: |
        docker push felipercz/docker-graph:$NEW_VERSION
        docker push felipercz/docker-graph:latest 
        
      
    
      
